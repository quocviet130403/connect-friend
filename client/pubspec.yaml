name: connect_app
description: "Connect - Nền tảng tạo cuộc hẹn gặp mặt trực tiếp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2
  
  # WebSocket
  web_socket_channel: ^3.0.1
  
  # Storage
  shared_preferences: ^2.3.3
  
  # Navigation
  go_router: ^14.6.2
  
  # UI helpers
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Location
  geolocator: ^13.0.2
  
  # Date/time
  intl: ^0.19.0
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
