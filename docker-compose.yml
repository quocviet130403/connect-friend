services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    env_file:
      - ./server/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - connect-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - server
    networks:
      - connect-network


  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
      - ./server/migrations/init-indexes.js:/docker-entrypoint-initdb.d/init-indexes.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - connect-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - connect-network

  mongo-express:
    image: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - connect-network

volumes:
  mongo-data:
  redis-data:

networks:
  connect-network:
    driver: bridge
